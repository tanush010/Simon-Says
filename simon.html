<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simon Says</title>
    <link rel="stylesheet" href="simon.css">
</head>
<body>
    <h1 class="text">Simon Says</h1>
    <h2 class="text">Press any key to Start the game!</h2>
    <div class="btn-container">
        <div class="line-one">
            <div type = "button" class="btn red" id="red"></div>
            <div type = "button" class="btn yellow" id="yellow"></div>
        </div>
        <div class="line-two">
            <div type = "button" class="btn green" id="green"></div>
            <div type = "button" class="btn blue" id="blue"></div>
        </div>
    </div>
    <p>High Score: <span id="high-score"><b>0</b></span></p>
    <script src="simon.js"></script>
</body>
</html>
